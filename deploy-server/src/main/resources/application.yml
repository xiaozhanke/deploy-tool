server:
  port: 6060
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-type: PKCS12
    key-alias: deploy
    key-store-password: changeit
  forward-headers-strategy: framework
logging:
  file:
    name: ./logs/${spring.application.name}.log
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_FILE}-%d{yyyy-MM-dd}.%i.log
  include-application-name: false
spring:
  application:
    name: deploy-server
    version: 1.2.4
  profiles:
    active: @spring.profiles.active@
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
  web:
    locale: zh_CN
app:
  security:
    jwt:
      # JWT 签名密钥（JWK JSON）持久化文件路径，跨进程重启稳定，避免重启踢出已登录用户。
      # 生产环境请预先生成并以受限权限部署；dev profile 默认允许自动生成。
      key-file: ./database/jwt-key.json
      key-id: deploy-jwt-key
      auto-create-on-missing: false
    cors:
      # 允许的跨域 Origin 列表。空列表（默认）表示仅同源访问，作用于 WebSocket 握手与 HTTP CORS 预检。
      # dev / staging 环境按需在对应 profile 配置文件追加，生产侧若同域部署可保持默认。
      allowed-origins: []
  file:
    # 允许上传的文件扩展名白名单（忽略大小写，可写复合后缀如 .tar.gz）。
    # 空列表代表不做限制（仅作存量兼容用），生产环境务必显式列出业务需要的类型。
    allowed-extensions:
      - .jar
      - .war
      - .zip
      - .tar.gz
      - .tgz
      - .sh
      - .conf
      - .yml
      - .yaml
      - .properties
      - .xml
      - .json
      - .txt
springdoc:
  swagger-ui:
    # 分组排序
    groups-order: desc
    # 标签排序
    tags-sorter: alpha
    # 操作排序
    operations-sorter: method
    persistAuthorization: true
  # 属性排序
  writer-with-order-by-keys: true
  cache:
    disabled: true
  show-actuator: true
  default-produces-media-type: application/json
